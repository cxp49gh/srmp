version: "3.8"

services:
  srmp-ai-orchestrator:
    image: ${SRMP_AI_ORCHESTRATOR_IMAGE:-srmp-ai-orchestrator:phase50.2}
    container_name: srmp-ai-orchestrator
    build:
      context: ./srmp-ai-orchestrator
      dockerfile: Dockerfile
    environment:
      SRMP_JAVA_BASE_URL: ${SRMP_JAVA_BASE_URL:-http://backend:8080}
      SRMP_JAVA_TOOL_EXECUTE_PATH: ${SRMP_JAVA_TOOL_EXECUTE_PATH:-/api/agent/tools/execute}
      SRMP_JAVA_TOOL_LIST_PATH: ${SRMP_JAVA_TOOL_LIST_PATH:-/api/agent/tools}
      SRMP_LANGGRAPH_ALLOW_WRITE_TOOLS: ${SRMP_LANGGRAPH_ALLOW_WRITE_TOOLS:-false}
      SRMP_LANGGRAPH_ALLOWED_TOOLS: ${SRMP_LANGGRAPH_ALLOWED_TOOLS:-knowledge.retrieve,gis.queryDiseases,gis.queryAssessmentResults,gis.queryDiseasesByStakeRange,gis.queryRegionSummary,gis.queryNearbyObjects,template.match}
      SRMP_LANGGRAPH_USE_LLM: ${SRMP_LANGGRAPH_USE_LLM:-false}
      SRMP_LLM_BASE_URL: ${SRMP_LLM_BASE_URL:-}
      SRMP_LLM_API_KEY: ${SRMP_LLM_API_KEY:-}
      SRMP_LLM_MODEL: ${SRMP_LLM_MODEL:-}
    ports:
      - "${SRMP_AI_ORCHESTRATOR_PORT:-18080}:18080"
    restart: unless-stopped
