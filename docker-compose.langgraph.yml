services:
  srmp-ai-orchestrator:
    image: ${SRMP_AI_ORCHESTRATOR_IMAGE:-srmp-ai-orchestrator:phase50.12}
    container_name: srmp-ai-orchestrator
    build:
      context: ./srmp-ai-orchestrator
      dockerfile: Dockerfile
    environment:
      SRMP_JAVA_BASE_URL: ${SRMP_JAVA_BASE_URL:-http://backend:8080}
      SRMP_JAVA_TOOL_EXECUTE_PATH: ${SRMP_JAVA_TOOL_EXECUTE_PATH:-/api/agent/tools/execute}
      SRMP_JAVA_TOOL_LIST_PATH: ${SRMP_JAVA_TOOL_LIST_PATH:-/api/agent/tools}
      SRMP_LANGGRAPH_ALLOW_WRITE_TOOLS: ${SRMP_LANGGRAPH_ALLOW_WRITE_TOOLS:-false}
      SRMP_LANGGRAPH_ALLOWED_TOOLS: ${SRMP_LANGGRAPH_ALLOWED_TOOLS:-knowledge.retrieve,gis.queryDiseases,gis.queryAssessmentResults,gis.queryDiseasesByStakeRange,gis.queryRegionSummary,gis.queryNearbyObjects,template.match,solution.generateDraft}
      SRMP_LANGGRAPH_STRATEGY_VERSION: ${SRMP_LANGGRAPH_STRATEGY_VERSION:-phase50.11-config-health-guard-v1}
      SRMP_LANGGRAPH_USE_LLM: ${SRMP_LANGGRAPH_USE_LLM:-false}
      SRMP_LLM_BASE_URL: ${SRMP_LLM_BASE_URL:-}
      SRMP_LLM_API_KEY: ${SRMP_LLM_API_KEY:-}
      SRMP_LLM_MODEL: ${SRMP_LLM_MODEL:-}
      SRMP_LANGGRAPH_LLM_CONNECT_TIMEOUT_SECONDS: ${SRMP_LANGGRAPH_LLM_CONNECT_TIMEOUT_SECONDS:-10}
      SRMP_LANGGRAPH_LLM_READ_TIMEOUT_SECONDS: ${SRMP_LANGGRAPH_LLM_READ_TIMEOUT_SECONDS:-180}
      SRMP_LANGGRAPH_LLM_MAX_TOKENS: ${SRMP_LANGGRAPH_LLM_MAX_TOKENS:-2048}
      SRMP_LANGGRAPH_LLM_COMPACT_RETRY_ENABLED: ${SRMP_LANGGRAPH_LLM_COMPACT_RETRY_ENABLED:-true}
      SRMP_LANGGRAPH_LLM_RAW_PREVIEW_CHARS: ${SRMP_LANGGRAPH_LLM_RAW_PREVIEW_CHARS:-500}
      SRMP_LANGGRAPH_AUDIT_MAX_RECORDS: ${SRMP_LANGGRAPH_AUDIT_MAX_RECORDS:-200}
      SRMP_LANGGRAPH_AUDIT_PERSIST_ENABLED: ${SRMP_LANGGRAPH_AUDIT_PERSIST_ENABLED:-true}
      SRMP_LANGGRAPH_AUDIT_PERSIST_PATH: ${SRMP_LANGGRAPH_AUDIT_PERSIST_PATH:-/var/lib/srmp/langgraph/runtime-audit.jsonl}
      SRMP_LANGGRAPH_AUDIT_PRUNE_DEFAULT_RETAIN_LATEST: ${SRMP_LANGGRAPH_AUDIT_PRUNE_DEFAULT_RETAIN_LATEST:-20}
    ports:
      - "${SRMP_AI_ORCHESTRATOR_PORT:-18080}:18080"
    volumes:
      - srmp_langgraph_audit:/var/lib/srmp/langgraph
    restart: unless-stopped

volumes:
  srmp_langgraph_audit:
