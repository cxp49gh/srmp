server:
  port: 8080

spring:
  application:
    name: srmp-admin

  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:srmp}
    username: ${DB_USER:srmp}
    password: ${DB_PASSWORD:srmp123}
    driver-class-name: org.postgresql.Driver

  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smartroad.srmp.*.entity
  configuration:
    map-underscore-to-camel-case: true

srmp:
  tenant:
    enabled: true
    header-name: X-Tenant-Id

  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:srmp}

  llm:
    provider: openai-compatible
    base-url: https://api.minimaxi.com/v1
    api-key: ${DASHSCOPE_API_KEY:}
    model: MiniMax-M2.7

  ai:
    embedding:
      provider: openai-compatible
      endpoint: https://api.minimax.chat/v1/embeddings
      api-key: ${DASHSCOPE_API_KEY:}
      model: embo-01
      dimensions: 1536