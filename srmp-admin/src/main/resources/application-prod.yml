server:
  port: 8080

spring:
  application:
    name: srmp-admin


srmp:
  ai:
    orchestrator:
      langgraph-url: ${SRMP_LANGGRAPH_URL:http://127.0.0.1:18080}
      langgraph-endpoint-path: ${SRMP_LANGGRAPH_ENDPOINT:/api/srmp/langgraph/map-agent/run}
      connect-timeout-ms: ${SRMP_LANGGRAPH_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${SRMP_LANGGRAPH_READ_TIMEOUT_MS:300000}
      allow-write-tools: ${SRMP_AI_TOOL_ALLOW_WRITE:false}
