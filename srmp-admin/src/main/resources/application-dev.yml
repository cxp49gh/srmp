server:
  port: 8080
  tomcat:
    # 大文件导入（路网/路段包/病害 Excel 等）：表单与非 multipart 请求体上限
    max-http-form-post-size: 500MB

spring:
  application:
    name: srmp-admin

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/srmp
    username: srmp
    password: srmp123
    driver-class-name: org.postgresql.Driver

  redis:
    host: 127.0.0.1
    port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smartroad.srmp.*.entity
  configuration:
    map-underscore-to-camel-case: true

srmp:
  tenant:
    enabled: true
    header-name: X-Tenant-Id

  # 路网 Shapefile 导入：.dbf 中文等文本字段编码（UTF-8 常见；老测绘数据多为 GBK / GB18030）
  import:
    network:
      dbf-charset: UTF-8

  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: srmp

  llm:
    provider: openai-compatible
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:sk-f39cf265c5ad4c378dc052d01db084e3}
    model: qwen3.6-plus-2026-04-02
    # 建立连接超时，默认 15 秒
    connect-timeout-ms: 15000
    # 等待模型返回超时，区域养护方案建议 180~300 秒
    read-timeout-ms: 300000
    # curl 兜底调用超时，建议和 read-timeout-ms 保持一致
    curl-max-time-seconds: 300
    max-tokens: 2400
    temperature: 0.2

  ai:

    orchestrator:
      # Phase50：一张图 AI 统一走远程 LangGraph /run 动作入口。
      langgraph-url: ${SRMP_LANGGRAPH_URL:http://127.0.0.1:18080}
      langgraph-endpoint-path: ${SRMP_LANGGRAPH_ENDPOINT:/api/srmp/langgraph/map-agent/run}
      connect-timeout-ms: ${SRMP_LANGGRAPH_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${SRMP_LANGGRAPH_READ_TIMEOUT_MS:300000}
      allow-write-tools: ${SRMP_AI_TOOL_ALLOW_WRITE:false}
    embedding:
      provider: local
      endpoint: ${SRMP_EMBEDDING_ENDPOINT:http://bge-m3.kuandeng.com:11434/api/embed}
      api-key: ${SRMP_LLM_API_KEY:}
      model: ${SRMP_EMBEDDING_MODEL:bge-m3}
      dimensions: ${SRMP_EMBEDDING_DIMENSIONS:1024}

  outline:
    enabled: ${OUTLINE_ENABLED:true}
    base-url: ${OUTLINE_BASE_URL:http://outline.kuandeng.com}
    api-token: ${OUTLINE_API_TOKEN:ol_api_5TP6DjcUyfd21beILa5tqybmbxoQIAgLtPskHK}
    sync-enabled: true
    default-collection-id: ${OUTLINE_DEFAULT_COLLECTION_ID:b2e510d9-4582-4991-8360-ba31d3b735ea}
    search-limit: ${OUTLINE_SEARCH_LIMIT:5}
    connect-timeout-ms: ${OUTLINE_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${OUTLINE_READ_TIMEOUT_MS:60000}
    rag:
      top-k: 8
      score-threshold: 0.0
      max-context-chars: 6000
      hybrid:
        enabled: true
        vector-top-k: 10
        keyword-top-k: 10
        vector-weight: 0.7
        keyword-weight: 0.3
